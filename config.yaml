server:
  host: "0.0.0.0"
  port: 8000
  api_key: ""

notifications:
  slack_webhook: ""
  discord_webhook: ""
  telegram_bot_token: ""
  telegram_chat_id: ""

tools:
  threads: 50
  timeout: 3600
  nuclei_severity: "critical,high,medium,low"
  user_agent: "Mozilla/5.0 (X11; Linux x86_64; rv:120.0) Gecko/20100101 Firefox/120.0"

tokens:
  github_token: ""
  shodan_key: ""

scan_defaults:
  modules:
    - subdomain
    - probing
    - portscan
    - screenshot
    - dirbrute
    - url_collection
    - js_discovery
    - vuln_scan
  wordlist: "/app/wordlists/paths.txt"
  excluded_subdomains: []

data_dir: "/data"
